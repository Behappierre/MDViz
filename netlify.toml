# Netlify build and deploy config for MD Visualizer
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command   = "npm run build"
  publish   = "dist"
  base      = "/"

# SPA fallback: serve index.html for non-file requests (e.g. refresh on subpath)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200
